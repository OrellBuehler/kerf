name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # kerf-app's tauri-build embeds the frontend at compile time, so it must exist.
      - name: Build frontend
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build
      - name: Clippy (no ffmpeg dev libs)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings

  frontend:
    name: frontend check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile
      - name: Type check (svelte-check)
        working-directory: frontend
        run: bun run check

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Unit + integration + doc tests. kerf-app is excluded (it needs the Tauri
      # toolchain + a built frontend); it is compiled in the `build` job instead.
      # --no-default-features keeps the FFmpeg dev libraries out of CI.
      - name: Run tests
        run: cargo test --workspace --exclude kerf-app --no-default-features

  build:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies (Tauri)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.platform }}
      - name: Build frontend
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build
      # Compile the desktop shell + MCP server on every OS without the FFmpeg
      # dev libraries (the CLI engine still drives the ffmpeg/ffprobe binaries).
      - name: Build app + MCP server
        run: cargo build --no-default-features -p kerf-app -p kerf-mcp
